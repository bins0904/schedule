<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ㄟ嘿嘿嘿嘿 </title>
    <link rel="stylesheet" href="大四下課表.css">
</head>
<body>
    <header class="app-header">
        <div class="container">
            <div class="header-main">
                <div class="logo-circle">
                    <img src="logo.jpg" alt="輪訓課表 Logo" class="logo-image">
                </div>
                <div class="header-text">
                    <h1 class="title">
                        你們好啊
                    </h1>
                    <p class="subtitle">
                     欸現在沒有內分泌跟GI，還沒給
                    </p>
                </div>
            </div>

            <div class="toolbar">
                <div class="toolbar-row">
                    <span class="label-with-icon">
                        <span class="icon">📅</span>
                        <span>週次</span>
                    </span>
                    <select id="week-select" class="select-control"></select>
                    <button id="midterm-button" class="secondary-button">期中考</button>
                    <button id="rotation-button" class="secondary-button">臨技、臨診、實診輪訓課表</button>
                    <button id="pbl-button" class="secondary-button">系統課課表 (PBL)</button>
                    <button id="rotation-rule-button" class="secondary-button">輪訓規則 (3/11後)</button>
                </div>

                <div class="toolbar-row">
                    <span class="label-with-icon">
                        <span class="icon">📆</span>
                        <span>日期</span>
                    </span>
                    <div id="date-selector" class="chip-group"></div>
                </div>

            </div>
        </div>
    </header>

    <div id="rotation-modal" class="modal-backdrop" hidden>
        <div class="modal" role="dialog" aria-modal="true" aria-label="Google Sheet">
            <div class="modal__header">
                <div id="sheet-modal-title" class="modal__title">Google Sheet</div>
                <div class="modal__actions">
                    <a id="rotation-open-new" class="modal__link" href="#" target="_blank" rel="noopener noreferrer">新分頁開啟</a>
                    <button id="rotation-close" class="secondary-button" type="button">關閉</button>
                </div>
            </div>
            <div class="modal__body">
                <iframe
                    id="rotation-iframe"
                    class="modal__frame"
                    title="臨診、實診輪訓課表"
                    loading="lazy"
                    referrerpolicy="no-referrer"
                ></iframe>
            </div>
        </div>
    </div>

    <main class="container main-content" id="schedule-container">
        <!-- 課程卡片由 JS 動態產生 -->
    </main>

    <footer class="app-footer">
        <p>非常好 真的非常好</p>
        <p class="footer-note">四下整體評分目前是NPC</p>
    </footer>

    <script src="大四下課表.js"></script>
</body>
</html>
